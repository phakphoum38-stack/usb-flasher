name: Build & Release FlashForge Pro

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # =========================
      # 🏗 BUILD EXE
      # =========================
      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed wizard.py --name FlashForgePro

      # =========================
      # 📦 Upload artifact
      # =========================
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: FlashForgePro
          path: dist/*

  # =========================
  # 🚀 RELEASE
  # =========================
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
