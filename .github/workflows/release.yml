name: Build & Release EXE

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install deps
      run: pip install pyinstaller tqdm requests

    - name: Build EXE
      run: python build.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: usb-flasher
        path: dist/*

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
