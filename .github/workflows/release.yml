name: Full Release Pipeline

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller psutil requests

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed wizard.py ^
          --add-data "kexts_repo;kexts_repo" ^
          --add-data "acpi_repo;acpi_repo"

      - name: Sign EXE
        run: |
          echo "Signing step here (optional)"
          # signtool sign /f cert.pfx ...

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: USB-Flasher-Pro
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
