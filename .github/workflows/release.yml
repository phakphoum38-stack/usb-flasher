name: Final Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller psutil

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed wizard.py \
          --add-data "kexts_repo;kexts_repo" \
          --add-data "acpi_repo;acpi_repo" \
          --add-data "OpenCore;OpenCore"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usb-flasher-pro
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
