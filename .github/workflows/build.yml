name: Build & Release Flash Tool

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # PYTHON
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install requests tqdm
          pip install pyinstaller

      # =========================
      # BUILD EXE (🔥 FIX สำคัญ)
      # =========================
      # =========================
      # BUILD GUI
      # =========================
      - name: Build GUI
        run: |
         pyinstaller --noconfirm --windowed --onefile wizard.py ^
         --name USBFlashToolPro ^
         --add-binary "rust-flash.exe;."

      # =========================
      # BUILD CLI
      # =========================
      - name: Build CLI
        run: |
         pyinstaller --noconfirm --onefile flasher.py ^
         --name usb-flasher-cli ^
         --add-binary "rust-flash.exe;."

      # =========================
      # DEBUG (เช็คไฟล์)
      # =========================
      - name: Show dist
        run: dir dist

      # =========================
      # INSTALL NSIS
      # =========================
      - name: Install NSIS
        run: choco install nsis -y

      # =========================
      # BUILD INSTALLER (optional)
      # =========================
      - name: Build Installer
        run: |
          if exist installer.nsi (
            makensis installer.nsi
          ) else (
            echo "No installer.nsi, skipping..."
          )

      # =========================
      # RELEASE
      # =========================
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/USBFlashToolPro.exe
            USBFlashToolPro-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
